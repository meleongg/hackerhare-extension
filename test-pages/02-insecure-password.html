<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackerHare — insecure password (HTTP)</title>
  </head>
  <body>
    <h1>Insecure password on HTTP</h1>
    <p>
      Mocks an unencrypted login. With <strong>Form Shielding</strong> and
      <strong>Insecure Input Alerts</strong> on, expect a warning banner and
      <code>threat-count +1</code> once per page load.
    </p>
    <form action="/login" method="post">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" />
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" />
      </label>
      <button type="submit">Sign in</button>
    </form>
    <p><a href="index.html">Back to index</a></p>
  </body>
</html>
