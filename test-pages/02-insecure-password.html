<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Cascade Outdoor Co.</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      body {
        background: #2d4a3e
          url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30h60M30 0v60' stroke='%23ffffff08'/%3E%3C/svg%3E");
      }
      .brand {
        text-align: center;
        padding: 2rem 1rem 1rem;
        color: #fff;
      }
      .brand h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .brand p {
        margin: 0.35rem 0 0;
        font-size: 0.85rem;
        opacity: 0.9;
      }
      .card h2 {
        margin: 0 0 1.25rem;
        font-size: 1.15rem;
        color: #2d4a3e;
      }
      .btn {
        background: #e85d04;
        color: #fff;
      }
      .fine {
        font-size: 0.75rem;
        color: #777;
        text-align: center;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <h1>Cascade Outdoor Co.</h1>
      <p>Member rewards &amp; order history</p>
    </div>
    <main class="shell">
      <div class="card">
        <h2>Sign in to your account</h2>
        <form action="/login" method="post">
          <div class="field">
            <label for="username">Email or member ID</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              placeholder="member@cascade-outdoor.com"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn">Sign in</button>
        </form>
        <p class="fine">Forgot password? · Create account</p>
      </div>
      <p class="foot"><a href="index.html">← Demo environments</a></p>
    </main>
  </body>
</html>
