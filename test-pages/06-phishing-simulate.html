<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in to your account</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      body {
        background: #f2f2f2;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .ms-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .ms-card {
        width: 100%;
        max-width: 440px;
        background: #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        padding: 2.5rem 2rem;
      }
      .ms-logo {
        display: flex;
        gap: 5px;
        margin-bottom: 1.5rem;
      }
      .ms-logo span {
        width: 11px;
        height: 11px;
        border-radius: 1px;
      }
      .ms-logo .r {
        background: #f25022;
      }
      .ms-logo .g {
        background: #7fba00;
      }
      .ms-logo .b {
        background: #00a4ef;
      }
      .ms-logo .y {
        background: #ffb900;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      .lead {
        margin: 0 0 1.75rem;
        font-size: 0.9rem;
        color: #444;
      }
      .pick {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .pick a {
        display: block;
        padding: 0.75rem 1rem;
        border: 1px solid #8c8c8c;
        background: #fff;
        text-decoration: none;
        color: #1b1b1b;
        font-size: 0.95rem;
        text-align: left;
      }
      .pick a:hover {
        background: #f5f5f5;
        border-color: #666;
      }
      .pick a strong {
        display: block;
        font-weight: 600;
      }
      .pick a span {
        font-size: 0.8rem;
        color: #666;
      }
      .legal {
        margin-top: 2rem;
        font-size: 0.7rem;
        color: #888;
        text-align: center;
        max-width: 440px;
      }
    </style>
  </head>
  <body>
    <div class="ms-wrap">
      <div class="ms-card">
        <div class="ms-logo" aria-hidden="true">
          <span class="r"></span>
          <span class="g"></span>
          <span class="b"></span>
          <span class="y"></span>
        </div>
        <h1>Sign in</h1>
        <p class="lead">
          Choose an account type to run a phishing demo (modal appears after you
          pick one).
        </p>
        <div class="pick">
          <a href="#simulateHost=microsoft.secure-verify.test">
            <strong>Work or school account</strong>
            <span>Microsoft subdomain impersonation</span>
          </a>
          <a href="#simulateHost=outlook.secure-verify.test">
            <strong>Personal account</strong>
            <span>Outlook subdomain impersonation</span>
          </a>
        </div>
      </div>
      <p class="legal">
        <a href="index.html">Demo environments</a> · Local preview only
      </p>
    </div>
  </body>
</html>
