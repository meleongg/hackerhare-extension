<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackerHare — clean baseline</title>
  </head>
  <body>
    <h1>Clean baseline</h1>
    <p>
      HTTP page with a normal form. Expect only
      <strong>HackerHare Shield Active</strong> in the console when shielding is on.
    </p>
    <form action="/noop" method="get">
      <label>
        Email
        <input type="email" name="email" autocomplete="email" />
      </label>
      <button type="submit">Subscribe</button>
    </form>
  </body>
</html>
