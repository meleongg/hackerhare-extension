<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start your free trial — Pulse Audio</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      body {
        background: linear-gradient(145deg, #1a0a2e 0%, #3d1a6e 45%, #12081f 100%);
        color: #fff;
      }
      .hero {
        text-align: center;
        padding: 2.5rem 1rem 1.5rem;
      }
      .hero h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.03em;
      }
      .hero p {
        margin: 0.5rem 0 0;
        font-size: 1rem;
        color: #c4b5fd;
      }
      .card {
        color: #1a1a1a;
      }
      .card h2 {
        margin: 0 0 0.25rem;
        font-size: 1.2rem;
      }
      .card .sub {
        margin: 0 0 1.25rem;
        font-size: 0.85rem;
        color: #666;
      }
      .btn {
        background: #7c3aed;
        color: #fff;
      }
      .check-row {
        background: #f5f3ff;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #ddd6fe;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Pulse Audio</h1>
      <p>3 months free · Premium sound</p>
    </div>
    <main class="shell">
      <div class="card">
        <h2>Create your account</h2>
        <p class="sub">No charge today. Cancel anytime.</p>
        <form action="#" method="post">
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@email.com"
            />
          </div>
          <label class="check-row">
            <input type="checkbox" name="newsletter" checked />
            <span
              >Yes! Send me exclusive deals, artist news, and marketing
              updates from Pulse Audio partners.</span
            >
          </label>
          <button type="submit" class="btn">Start free trial</button>
        </form>
      </div>
      <p class="foot" style="color: #a78bfa">
        <a href="index.html" style="color: #c4b5fd">← Demo environments</a>
      </p>
    </main>
  </body>
</html>
