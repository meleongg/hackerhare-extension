<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackerHare — dark pattern opt-in</title>
  </head>
  <body>
    <h1>Pre-checked marketing checkbox</h1>
    <p>
      With <strong>Form Shielding</strong> and <strong>Dark Pattern Alerts</strong>
      on, a banner should appear above this form and <code>threat-count</code> should
      increment once.
    </p>
    <form action="#" method="post">
      <label>
        <input type="checkbox" name="newsletter" checked />
        Subscribe to our newsletter for exclusive deals
      </label>
      <p>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" />
        </label>
      </p>
      <button type="submit">Sign up</button>
    </form>
    <p><a href="index.html">Back to index</a></p>
  </body>
</html>
